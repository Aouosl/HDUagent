<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 | 凌霄 · 云端渗透作战平台</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.staticfile.net/vue/3.3.4/vue.global.min.js"></script>
    <script src="https://cdn.staticfile.net/axios/1.6.2/axios.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/common.css">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: #0b0f19;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="app" v-cloak class="relative z-10 w-full max-w-lg">
        <div class="glass-card rounded-3xl p-8 md:p-10">

            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold text-white tracking-tight">节点授权申请</h1>
                <p class="text-sm text-gray-400 mt-2">创建 凌霄 独立操作员账号</p>
            </div>

            <!-- 提示信息 -->
            <div v-if="errorMsg" class="mb-4 p-3 bg-rose-500/10 border border-rose-500/30 rounded-xl text-rose-400 text-sm text-center backdrop-blur-sm">
                {{ errorMsg }}
            </div>
            <div v-if="successMsg" class="mb-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-xl text-emerald-400 text-sm text-center backdrop-blur-sm">
                {{ successMsg }}
            </div>

            <form @submit.prevent="handleRegister" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-300 mb-1 uppercase tracking-wide">账号名称</label>
                    <input v-model="form.username" type="text" required
                           class="w-full input-dark px-4 py-3 rounded-xl">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-300 mb-1 uppercase tracking-wide">设置密码</label>
                        <input v-model="form.password" type="password" required
                               class="w-full input-dark px-4 py-3 rounded-xl">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-300 mb-1 uppercase tracking-wide">确认密码</label>
                        <input v-model="confirmPassword" type="password" required
                               class="w-full input-dark px-4 py-3 rounded-xl">
                    </div>
                </div>

                <hr class="border-gray-700 my-5">

                <div>
                    <label class="block text-xs font-semibold text-gray-300 mb-1 uppercase tracking-wide">默认大模型提供商</label>
                    <select v-model="form.provider" class="w-full input-dark px-4 py-3 rounded-xl">
                        <option value="deepseek">DeepSeek (推荐)</option>
                        <option value="openai">OpenAI</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-300 mb-1 uppercase tracking-wide">提供商私有 API Key (可选)</label>
                    <input v-model="form.api_key" type="password" placeholder="sk-... (可进入系统后配置)"
                           class="w-full input-dark px-4 py-3 rounded-xl">
                </div>

                <button type="submit" :disabled="isLoading"
                        class="btn-shine relative w-full bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-800 hover:to-slate-900 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-slate-700/30 transition-all flex justify-center items-center gap-2 mt-6 border border-slate-600">
                    <span v-if="isLoading" class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                    <span v-else>提交注册</span>
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-400">
                已有操作员账号？
                <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-medium transition-colors">返回授权登录</a>
            </div>
        </div>

        <p class="text-center text-gray-500 text-xs mt-6">© 2026 凌霄 · 安全研究用途，请合法使用</p>
    </div>

    <!-- 粒子动画脚本 -->
    <script>
    </script>

    <!-- Vue 注册逻辑 (与原版完全一致) -->
    <script>
        const { createApp, ref } = Vue;

        createApp({
            setup() {
                const form = ref({
                    username: '',
                    password: '',
                    provider: 'deepseek',
                    api_key: ''
                });
                const confirmPassword = ref('');
                const isLoading = ref(false);
                const errorMsg = ref('');
                const successMsg = ref('');

                const handleRegister = async () => {
                    errorMsg.value = '';
                    successMsg.value = '';

                    if (form.value.password !== confirmPassword.value) {
                        errorMsg.value = '两次输入的密码不一致，请检查。';
                        return;
                    }

                    isLoading.value = true;
                    try {
                        const response = await axios.post('/api/auth/register', form.value);
                        successMsg.value = '档案初始化成功！2秒后跳转登录页面...';
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } catch (error) {
                        console.error(error);
                        if (error.response && error.response.data) {
                            errorMsg.value = error.response.data.detail || "注册失败，该账号可能已存在。";
                        } else {
                            errorMsg.value = "网络通信异常，请检查后端服务是否启动。";
                        }
                    } finally {
                        isLoading.value = false;
                    }
                };

                return { form, confirmPassword, isLoading, errorMsg, successMsg, handleRegister };
            }
        }).mount('#app');
    </script>
    <script src="./js/particles.js"></script>
    <script>Particles.init();</script>
</body>
</html>
