version: '3.8'

services:
  # ==========================================
  # 🌟 核心底座一：HDU-Postgres 主数据库 (按你的要求定制)
  # ==========================================
  hdu-postgres:
    image: postgres:15-alpine
    container_name: hdu-postgres
    environment:
      - POSTGRES_USER=hdu_admin
      - POSTGRES_PASSWORD=HDU@gent
      - POSTGRES_DB=hdu_agent_db
    ports:
      - "54321:5432"
    restart: unless-stopped
    volumes:
      - hdu-pgdata:/var/lib/postgresql/data
    networks:
      - hdu-network


  # ==========================================
  # 🌟 智能体三：GSAgent (PentAGI) 及其附属组件
  # (直接整合你上传的 GSAgent 依赖，由 Compose 统一管理)
  # ==========================================
  pentagi:
    build: 
      context: ./GSAgent
      dockerfile: Dockerfile
    image: vxcontrol/pentagi:latest  # 如果构建太慢，Docker会默认拉取这个官方镜像
    container_name: pentagi
    restart: unless-stopped
    ports:
      - "8443:8443"
    depends_on:
      pgvector:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://postgres:postgres@pgvector:5432/pentagidb?sslmode=disable
    volumes:
      - pentagi-data:/opt/pentagi/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - hdu-network

  pgvector:
    image: vxcontrol/pgvector:latest
    container_name: pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pentagidb
    volumes:
      - pentagi-postgres-data:/var/lib/postgresql/data
    networks:
      - hdu-network

  scraper:
    image: vxcontrol/scraper:latest
    container_name: scraper
    restart: unless-stopped
    ports:
      - "9443:443"
    volumes:
      - scraper-ssl:/usr/src/app/ssl
    networks:
      - hdu-network

volumes:
  hdu-pgdata:
  pentagi-data:
  pentagi-postgres-data:
  scraper-ssl:

networks:
  hdu-network:
    driver: bridge